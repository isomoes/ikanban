<!doctype html>
<html lang="en" style="background-color: var(--background-base)">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Coordinate OpenCode sessions, projects, and parallel coding agents from one workspace." />
    <meta property="og:title" content="iKanban" />
    <meta property="og:description" content="A multi-agent coding workspace powered by OpenCode." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link
      rel="icon"
      type="image/png"
      href="/favicon-96x96-v3.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon-v3.svg" />
    <link rel="shortcut icon" href="/favicon-v3.ico" />

      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon-v3.png"
    />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#F5F6F7" />

      name="theme-color"
      content="#111315"
      media="(prefers-color-scheme: dark)"
    />

      .skip-link {
        position: fixed;
        top: 0;

        transform: translateY(calc(-100% - 1rem));

      .skip-link:focus {
        transform: translateY(0);
      }
    </style>
    <script id="oc-theme-preload-script" src="/oc-theme-preload.js"></script>
